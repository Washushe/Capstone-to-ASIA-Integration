spring.application.name=compostsystem

spring.datasource.url=jdbc:mysql://localhost:3306/compost_system?useSSL=false&serverTimezone=Asia/Manila&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

server.port=8080

app.session.duration-minutes=60
app.password-reset.expiration-minutes=30
app.notification.email=${NOTIFICATION_EMAIL}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash